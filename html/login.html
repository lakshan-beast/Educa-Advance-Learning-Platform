  <body>
    <div class="auth-container">
      <div class="log-wrapper auth-box" id="log-wrapper">
        <form action="">
          <h1>Login</h1>

          <div class="input-box">
            <label for="uname"><i class="fa-solid fa-user"></i></label>
            <input
              type="text"
              class="uname"
              id="uname"
              placeholder="Username"
              required />
          </div>
          <div class="input-box">
            <label for="passwords"
              ><i class="fa-solid fa-lock" id="lock"></i
            ></label>
            <input
              type="password"
              class="password"
              id="password"
              placeholder="Password"
              required />
          </div>
          <div class="remember-forgot">
            <label
              ><input type="checkbox" checked="checked" />Remember Me</label
            >
            <a href="#">Forgot password</a>
          </div>
          <input
            type="submit"
            class="button"
            id="submit-btn"
            a
            href="#"
            value="Login" />
          <div class="register-link">
            <p>
              Don't have an account ?
              <button type="button" onclick="signForm()">Sign up</button>
            </p>
          </div>
          <!-- </button> -->
        </form>
      </div>

      <div class="signup-wrapper auth-box" id="signup-wrapper">
        <h1>Sign Up</h1>

        <form action="" method="post">
          <div class="input-box">
            <label for="uname"><i class="fa-solid fa-user"></i></label>
            <input
              type="text"
              class="uname"
              id="uname"
              placeholder="Enter  Your Username"
              pattern="[A-Za-z]{5, 10}"
              required />
          </div>

          <div class="input-box">
            <label for="passwords"
              ><i class="fa-solid fa-lock" id="lock"></i
            ></label>
            <input
              type="password"
              class="password"
              id="passwords "
              placeholder="Password"
              pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
              required />
          </div>

          <div class="input-box">
            <label for="passwords"
              ><i class="fa-solid fa-lock" id="lock"></i
            ></label>
            <input
              type="password"
              class="password"
              id="passwords"
              placeholder="Confirm Password"
              pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
              required />
          </div>
          <input
            type="submit"
            class="button"
            id="submit-btn"
            a
            href="#"
            value="Signup" />
          <div class="signup-link">
            <p>
              Already have an account?
              <button type="button" onclick="loginForm()">Login</button>
              <span id="show-login">Login</span>
            </p>
          </div>
        </form>
      </div>
    </div>
